<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapi EO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">Kapi EO</a>
      <div>
        <a class="btn btn-outline-light" href="/login">Login</a>
      </div>
    </div>
  </nav>

  <!-- Landing Page -->
  <section class="py-5 text-center bg-white">
    <div class="container">
      <h1 class="display-5">Selamat Datang di Kapi Event Organizer</h1>
      <p class="lead">Kelola acara Anda bersama vendor terbaik dan laporan anggaran otomatis.</p>
      <a href="/register" class="btn btn-primary btn-lg">Mulai Sekarang</a>
    </div>
  </section>

  <!-- Login Page -->
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
      <h3 class="mb-3 text-center">Login ke Kapi EO</h3>
      <form action="/login" method="POST">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Masuk</button>
      </form>
      <p class="text-center mt-3">Belum punya akun? <a href="/register">Daftar di sini</a></p>
    </div>
  </div>



  <!-- Footer -->
  <footer class="bg-primary text-white text-center py-3 mt-5">
    <div class="container">&copy; 2025 Kapi EO. All rights reserved.</div>
  </footer>

</body>
</html>
