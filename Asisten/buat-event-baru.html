<body class="bg-light">
  <div class="container mt-5">
    <h2>Buat Event Baru</h2>
    <form>
      <div class="mb-3">
        <label for="namaEvent" class="form-label">Nama Event</label>
        <input type="text" class="form-control" id="namaEvent" name="namaEvent">
      </div>
      <div class="mb-3">
        <label for="tanggal" class="form-label">Tanggal Event</label>
        <input type="date" class="form-control" id="tanggal" name="tanggal">
      </div>
      <div class="mb-3">
        <label for="lokasi" class="form-label">Lokasi</label>
        <input type="text" class="form-control" id="lokasi" name="lokasi">
      </div>
      <div class="mb-3">
        <label for="klien" class="form-label">Klien</label>
        <input type="text" class="form-control" id="klien" name="klien">
      </div>
      <button type="submit" class="btn btn-primary">Buat Event</button>
    </form>
  </div>
</body>
