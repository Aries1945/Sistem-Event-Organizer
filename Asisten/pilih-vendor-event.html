<body class="bg-light">
  <div class="container mt-5">
    <h2>Pilih Vendor untuk Event</h2>
    <form>
      <div class="mb-3">
        <label for="event" class="form-label">Pilih Event</label>
        <select class="form-select" id="event">
          <option selected>Pilih Event</option>
          <option value="event1">Pernikahan A & B</option>
          <option value="event2">Seminar Startup</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="vendor" class="form-label">Pilih Vendor</label>
        <select multiple class="form-select" id="vendor">
          <option value="dekorasi">CV Dekor Indah (Dekorasi)</option>
          <option value="catering">Rasa Nikmat (Catering)</option>
          <option value="dokumentasi">Lensaku (Dokumentasi)</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Hubungkan Vendor</button>
    </form>
  </div>
</body>
