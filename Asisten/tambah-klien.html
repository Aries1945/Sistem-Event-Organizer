<body class="bg-light">
  <div class="container mt-5">
    <h2>Tambah Klien Baru</h2>
    <form>
      <div class="mb-3">
        <label for="namaKlien" class="form-label">Nama Klien</label>
        <input type="text" class="form-control" id="namaKlien" name="namaKlien">
      </div>
      <div class="mb-3">
        <label for="emailKlien" class="form-label">Email Klien</label>
        <input type="email" class="form-control" id="emailKlien" name="emailKlien">
      </div>
      <div class="mb-3">
        <label for="teleponKlien" class="form-label">Telepon</label>
        <input type="text" class="form-control" id="teleponKlien" name="teleponKlien">
      </div>
      <button type="submit" class="btn btn-primary">Simpan</button>
    </form>
  </div>
</body>
