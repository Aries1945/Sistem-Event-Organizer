<body class="bg-light">
  <div class="container mt-5">
    <h2>Tambah Vendor Baru</h2>
    <form>
      <div class="mb-3">
        <label for="namaVendor" class="form-label">Nama Vendor</label>
        <input type="text" class="form-control" id="namaVendor" name="namaVendor">
      </div>
        <div class="mb-3">
        <label for="namaOwner" class="form-label">Nama Owner</label>
        <input type="text" class="form-control" id="namaOwner" name="namaOwner">
      </div>
      <div class="mb-3">
        <label for="jenisVendor" class="form-label">Jenis Vendor</label>
        <select class="form-select" id="jenisVendor" name="jenisVendor">
          <option selected>Pilih Jenis Vendor</option>
          <option value="dekorasi">Dekorasi</option>
          <option value="catering">Catering</option>
          <option value="dokumentasi">Dokumentasi</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="rangeHarga" class="form-label">Range Harga Per Pax</label>
        <input type="number" class="form-control" id="rangeHarga" name="rangeHarga">
      </div>
      <div class="mb-3">
        <label for="kontak" class="form-label">Kontak Vendor</label>
        <input type="text" class="form-control" id="kontak" name="kontak">
      </div>
      <div class="mb-3">
        <label for="Alamat" class="form-label">Alamat</label>
        <input type="text" class="form-control" id="alamat" name="alamat">
      </div>
      <button type="submit" class="btn btn-primary">Simpan</button>
    </form>
  </div>
</body>
